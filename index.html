<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zentra | Finance App Directory</title>
    
    <!-- Fuentes y Animaciones -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        :root {
            --primary: #ff4d2a;
            --secondary: #4d7fff;
            --bg-dark: #08080a;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --gradient: linear-gradient(135deg, #ff4d2a 0%, #ff8e2a 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg-dark);
            color: white;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Fondo Animado de Gradientes (Igual a la imagen) */
        .bg-glow {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 10% 20%, rgba(255, 77, 42, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(77, 127, 255, 0.15) 0%, transparent 40%);
            z-index: -1;
        }

        /* Navbar */
        nav {
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(15px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--glass-border);
        }

        .logo { font-weight: 800; font-size: 1.5rem; letter-spacing: -1px; display: flex; align-items: center; gap: 10px; }
        .logo span { color: var(--primary); }

        .search-bar {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 10px 20px;
            border-radius: 50px;
            width: 40%;
            color: white;
            outline: none;
            transition: 0.3s;
        }

        .search-bar:focus { width: 50%; border-color: var(--primary); box-shadow: 0 0 15px rgba(255, 77, 42, 0.3); }

        /* Hero */
        header { padding: 80px 5% 40px; text-align: center; }
        header h1 { font-size: clamp(2.5rem, 5vw, 4rem); font-weight: 800; margin-bottom: 15px; }
        header span { background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* Grid de Tarjetas */
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
            padding: 40px 5%;
            perspective: 1000px;
        }

        /* Tarjeta Estilo 3D & Glassmorphism */
        .card {
            background: var(--glass);
            border-radius: 28px;
            padding: 15px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-10px) rotateX(5deg) rotateY(5deg);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .card-img {
            width: 100%;
            aspect-ratio: 16/9; /* Tamaño 1920x1080 adaptado */
            object-fit: cover;
            border-radius: 20px;
            margin-bottom: 20px;
        }

        .card-content h3 { font-size: 1.5rem; margin-bottom: 10px; }
        .card-content p { color: #888; font-size: 0.95rem; line-height: 1.6; min-height: 50px; }

        .btn-download {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            background: var(--gradient);
            color: white;
            text-decoration: none;
            padding: 15px;
            border-radius: 15px;
            margin-top: 20px;
            font-weight: 700;
            transition: 0.3s;
            border: none;
            cursor: pointer;
        }

        .btn-download:hover { transform: scale(1.03); filter: brightness(1.1); }

        /* Panel Admin Modal */
        .modal {
            display: none; position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center;
        }

        .modal-content {
            background: #121214; padding: 40px; border-radius: 30px; width: 90%; max-width: 500px;
            border: 1px solid var(--primary);
        }

        input, textarea {
            width: 100%; padding: 15px; margin-bottom: 15px; background: #1a1a1c;
            border: 1px solid #333; color: white; border-radius: 12px; outline: none;
        }

        .btn-admin { background: white; color: black; padding: 10px 20px; border-radius: 50px; font-weight: bold; cursor: pointer; border:none;}

        /* Móvil */
        @media (max-width: 768px) {
            .search-bar { width: 100%; margin-top: 15px; }
            nav { flex-direction: column; }
            .container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <nav>
        <div class="logo">
            <svg width="30" height="30" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M22 0C9.84974 0 0 9.84974 0 22C0 34.1503 9.84974 44 22 44C34.1503 44 44 34.1503 44 22C44 9.84974 34.1503 0 22 0ZM32 24H12V20H32V24Z" fill="white"/></svg>
            Zentra <span>App</span>
        </div>
        <input type="text" id="searchInput" class="search-bar" placeholder="Buscar planes financieros...">
        <button class="btn-admin" onclick="openAdmin()">Acceso Admin</button>
    </nav>

    <header>
        <h1 data-aos="fade-down">Construye tu Futuro con <span>Confianza</span></h1>
        <p data-aos="fade-up" style="color: #888;">Explora recursos exclusivos de alta calidad.</p>
    </header>

    <main class="container" id="cardsGrid">
        <!-- Las tarjetas se generan aquí -->
    </main>

    <!-- MODAL ADMINISTRADOR -->
    <div id="adminModal" class="modal">
        <div class="modal-content">
            <div id="loginSection">
                <h2 style="margin-bottom:20px">🔐 Panel Seguro</h2>
                <input type="email" id="email" placeholder="Email (admin@zentra.com)">
                <input type="password" id="pass" placeholder="Contraseña">
                <button class="btn-download" onclick="handleLogin()">Entrar</button>
            </div>
            
            <div id="uploadSection" style="display:none">
                <h2 style="margin-bottom:20px">✨ Crear Nueva Tarjeta</h2>
                <input type="text" id="title" placeholder="Nombre de la tarjeta">
                <textarea id="desc" placeholder="Descripción corta..."></textarea>
                <input type="text" id="imgUrl" placeholder="URL Imagen (1920x1080)">
                <button class="btn-download" onclick="saveCard()">Publicar en tiempo real</button>
            </div>
            <button onclick="closeAdmin()" style="margin-top:10px; background:none; color:#555; border:none; cursor:pointer">Cerrar</button>
        </div>
    </div>

    <!-- SCRIPTS -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

    <script>
        // 1. CONFIGURACIÓN FIREBASE (REEMPLAZA ESTO)
        const firebaseConfig = {
            apiKey: "AIzaSyCgw6tbUFKu1uHFkO6MFbmRUsvd8wXVH58",
            authDomain: "forever-ja.firebaseapp.com",
            projectId: "forever-ja",
            storageBucket: "forever-ja.firebasestorage.app",
            messagingSenderId: "774693890413",
            appId: "1:774693890413:web:d4118e797cb42f3de55264"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        AOS.init({ duration: 1000, once: true });

        // 2. CARGA EN TIEMPO REAL
        db.collection("cards").orderBy("createdAt", "desc").onSnapshot((snapshot) => {
            const grid = document.getElementById('cardsGrid');
            grid.innerHTML = '';
            snapshot.forEach((doc) => {
                const data = doc.data();
                grid.innerHTML += `
                    <div class="card" data-aos="zoom-in-up">
                        <img src="${data.image}" class="card-img" alt="1920x1080 resource">
                        <div class="card-content">
                            <h3>${data.title}</h3>
                            <p>${data.description}</p>
                            <button class="btn-download" onclick="downloadImage('${data.image}')">
                                ⬇️ Descargar (1080p)
                            </button>
                        </div>
                    </div>
                `;
            });
        });

        // 3. LÓGICA DE BÚSQUEDA
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            document.querySelectorAll('.card').forEach(card => {
                const text = card.innerText.toLowerCase();
                card.style.display = text.includes(term) ? 'block' : 'none';
            });
        });

        // 4. SISTEMA ADMINISTRADOR
        function openAdmin() { document.getElementById('adminModal').style.display = 'flex'; }
        function closeAdmin() { document.getElementById('adminModal').style.display = 'none'; }

        function handleLogin() {
            const u = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            if(u === "admin@zentra.com" && p === "Zentra2024!") {
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('uploadSection').style.display = 'block';
            } else {
                alert("Acceso incorrecto");
            }
        }

        async function saveCard() {
            const title = document.getElementById('title').value;
            const description = document.getElementById('desc').value;
            const image = document.getElementById('imgUrl').value;

            if(!title || !image) return alert("Por favor completa los campos");

            await db.collection("cards").add({
                title, description, image,
                createdAt: new Date()
            });

            alert("¡Publicado con éxito!");
            closeAdmin();
        }

        // 5. FUNCIÓN DESCARGAR
        function downloadImage(url) {
            const link = document.createElement('a');
            link.href = url;
            link.download = 'Zentra_Finanzas_Premium.jpg';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
