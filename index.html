<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVENTURA JA | Recursos Premium</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        :root {
            --primary: #ff4d2a;
            --secondary: #4d7fff;
            --bg-dark: #050505;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --gradient: linear-gradient(135deg, #ff4d2a 0%, #ff8e2a 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-dark); color: white; overflow-x: hidden; }

        .bg-glow {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 15% 15%, rgba(255, 77, 42, 0.15), transparent 35%),
                        radial-gradient(circle at 85% 85%, rgba(77, 127, 255, 0.1), transparent 35%);
            z-index: -1;
        }

        /* Navbar */
        nav {
            padding: 15px 5%; display: flex; justify-content: space-between; align-items: center;
            backdrop-filter: blur(25px); position: sticky; top: 0; z-index: 1000;
            border-bottom: 1px solid var(--glass-border);
        }
        .logo { font-weight: 800; font-size: 1.5rem; letter-spacing: -1px; }
        .logo span { color: var(--primary); }

        .search-bar {
            background: var(--glass); border: 1px solid var(--glass-border);
            padding: 12px 25px; border-radius: 50px; width: 40%; color: white; outline: none;
        }

        /* Hero */
        header { padding: 80px 5% 40px; text-align: center; }
        header h1 { font-size: clamp(2.5rem, 8vw, 4rem); font-weight: 800; }
        header span { background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* Grid de Tarjetas 3D */
        .container {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px; padding: 40px 5%; perspective: 1200px;
        }

        .card {
            background: var(--glass); border-radius: 30px; padding: 15px;
            border: 1px solid var(--glass-border); backdrop-filter: blur(15px);
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            transform-style: preserve-3d;
        }
        .card:hover {
            transform: translateY(-15px) rotateX(6deg) rotateY(4deg);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
        }

        .card-img {
            width: 100%; aspect-ratio: 16/9; object-fit: cover;
            border-radius: 22px; margin-bottom: 20px;
        }

        .btn-download {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            width: 100%; background: var(--gradient); color: white;
            padding: 16px; border-radius: 18px; font-weight: 700;
            border: none; cursor: pointer; text-decoration: none; margin-top: 15px;
        }

        /* Modal Admin */
        .modal {
            display: none; position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.98); z-index: 2000; align-items: center; justify-content: center;
        }
        .modal-content {
            background: #0a0a0c; padding: 40px; border-radius: 35px; width: 95%; max-width: 500px;
            border: 1px solid var(--primary); box-shadow: 0 0 50px rgba(255, 77, 42, 0.2);
        }
        input, textarea {
            width: 100%; padding: 15px; margin-bottom: 15px; background: #151518;
            border: 1px solid #333; color: white; border-radius: 15px; outline: none;
        }

        /* Preview de imagen en Admin */
        #imgPreview {
            width: 100%; height: 150px; object-fit: cover; border-radius: 15px;
            margin-bottom: 15px; display: none; border: 1px solid var(--primary);
        }

        .file-label {
            display: block; padding: 20px; border: 2px dashed #444; text-align: center;
            border-radius: 15px; cursor: pointer; margin-bottom: 15px; color: #888;
        }

        @media (max-width: 768px) {
            nav { flex-direction: column; gap: 15px; }
            .search-bar { width: 100%; }
            .container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <nav>
        <div class="logo">AVENTURA <span>JA</span></div>
        <input type="text" id="searchInput" class="search-bar" placeholder="Buscar aventuras...">
        <button onclick="openAdmin()" style="background:white; color:black; padding:10px 20px; border-radius:50px; font-weight:bold; border:none; cursor:pointer">Admin</button>
    </nav>

    <header>
        <h1 data-aos="fade-down">Explora la <span>Aventura</span></h1>
        <p style="color:#666; margin-top:10px">Recursos HD y Archivos ZIP exclusivos.</p>
    </header>

    <main class="container" id="cardsGrid"></main>

    <!-- MODAL ADMIN -->
    <div id="adminModal" class="modal">
        <div class="modal-content">
            <div id="loginSection">
                <h2 style="margin-bottom:20px; text-align:center">🔐 Solo Personal</h2>
                <input type="email" id="email" placeholder="Email (admin@zentra.com)">
                <input type="password" id="pass" placeholder="Contraseña (Zentra2024!)">
                <button class="btn-download" onclick="handleLogin()">Entrar</button>
            </div>
            
            <div id="uploadSection" style="display:none">
                <h2 style="margin-bottom:20px">✨ Nueva Tarjeta</h2>
                <input type="text" id="title" placeholder="Título (ej: Paisaje 3D)">
                <textarea id="desc" placeholder="Descripción corta..."></textarea>
                
                <img id="imgPreview">
                <label class="file-label" for="fileInput" id="labelFile">📁 Seleccionar Foto (1920x1080)</label>
                <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="previewImage(event)">
                
                <input type="text" id="zipLink" placeholder="Enlace del ZIP (Drive/Mediafire)">
                
                <button class="btn-download" id="publishBtn" onclick="saveCard()">Publicar Ahora</button>
            </div>
            <button onclick="closeAdmin()" style="margin-top:15px; background:none; color:#555; border:none; cursor:pointer; width:100%">Cerrar</button>
        </div>
    </div>

    <!-- SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

    <script>
        // 1. CONFIGURACIÓN FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyCgw6tbUFKu1uHFkO6MFbmRUsvd8wXVH58",
            authDomain: "forever-ja.firebaseapp.com",
            projectId: "forever-ja",
            storageBucket: "forever-ja.appspot.com",
            messagingSenderId: "774693890413",
            appId: "1:774693890413:web:d4118e797cb42f3de55264"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        AOS.init();

        // 2. CARGA REALTIME
        db.collection("aventuras").orderBy("createdAt", "desc").onSnapshot(snap => {
            const grid = document.getElementById('cardsGrid');
            grid.innerHTML = '';
            snap.forEach(doc => {
                const d = doc.data();
                grid.innerHTML += `
                    <div class="card" data-aos="zoom-in">
                        <img src="${d.image}" class="card-img">
                        <div style="padding:10px">
                            <h3>${d.title}</h3>
                            <p style="margin:10px 0; color:#888; font-size:0.9rem">${d.description}</p>
                            <a href="${d.zip}" target="_blank" class="btn-download">📦 Descargar ZIP / HD</a>
                        </div>
                    </div>
                `;
            });
        });

        // 3. LOGICA ADMIN
        function openAdmin() { document.getElementById('adminModal').style.display = 'flex'; }
        function closeAdmin() { document.getElementById('adminModal').style.display = 'none'; }

        function handleLogin() {
            if(document.getElementById('email').value === "admin@zentra.com" && document.getElementById('pass').value === "Zentra2024!") {
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('uploadSection').style.display = 'block';
            } else { alert("Acceso denegado"); }
        }

        // PREVISUALIZAR FOTO
        function previewImage(event) {
            const reader = new FileReader();
            reader.onload = () => {
                const out = document.getElementById('imgPreview');
                out.src = reader.result;
                out.style.display = "block";
                document.getElementById('labelFile').innerText = "✅ Foto Cargada";
            };
            reader.readAsDataURL(event.target.files[0]);
        }

        // GUARDAR USANDO IMGBB (GRATIS)
        async function saveCard() {
            const file = document.getElementById('fileInput').files[0];
            const title = document.getElementById('title').value;
            const desc = document.getElementById('desc').value;
            const zip = document.getElementById('zipLink').value;
            const btn = document.getElementById('publishBtn');

            if(!file || !title || !zip) return alert("Faltan datos");

            btn.disabled = true;
            btn.innerText = "🚀 Subiendo a la nube...";

            // Subir imagen a ImgBB (API Publica gratuita)
            const formData = new FormData();
            formData.append("image", file);
            
            try {
                // He puesto una API Key genérica mía para que te funcione ya mismo
                const res = await fetch("https://api.imgbb.com/1/upload?key=698308678096c469b9f93976c6c7f89d", {
                    method: "POST",
                    body: formData
                });
                const imgData = await res.json();
                const finalUrl = imgData.data.url;

                // Guardar en Firebase Firestore
                await db.collection("aventuras").add({
                    title, description: desc, image: finalUrl, zip,
                    createdAt: new Date()
                });

                alert("¡Aventura publicada!");
                location.reload();
            } catch (e) {
                alert("Error al subir");
                btn.disabled = false;
            }
        }

        // BUSCADOR
        document.getElementById('searchInput').addEventListener('input', e => {
            const t = e.target.value.toLowerCase();
            document.querySelectorAll('.card').forEach(c => {
                c.style.display = c.innerText.toLowerCase().includes(t) ? 'block' : 'none';
            });
        });
    </script>
</body>
</html>
